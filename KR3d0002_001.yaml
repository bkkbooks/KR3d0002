body:
  text: 農書卷上宋陳敷撰財力之宜篇第一凡從事於務者皆當量力而為之不可茍且貪多務得以致終無成遂也傳曰少則得多則惑況稼穡在艱難之尤者詎可不先度其財足以贍力足以給優遊不迫可以取必效然後為之儻或財不贍力不給而貪多務得未免茍簡滅裂之患十不得一二幸其成功已不可必矣雖多其田畝是多其患害未見其利益也若深思熟計既善其始又善其中終必有成遂之常矣豈徒茍徼一時之幸哉易曰君子以作事謀始誠哉是言也且古者分田之制一夫一婦受田百畝草萊之地稱焉以其地有肥磽不同故有不易一易再易之别焉不易之地上地也家百畝謂可歲耕之也一易之地中地也家二百畝謂間嵗耕其半以息地氣且裕民之力也再易之地下地也家三百畝謂嵗耕百畝三嵗而一周也先王之制如此非獨以謂土敝則草木不長氣衰而生物不遂也抑欲其財力優裕嵗嵗常稔不致務廣而俱失故皆以深耕易耨而百榖用成國裕民富可待也仰事俯育可必也諺有之曰多虛不如少實廣種不如狹收豈不信然竊嘗有以喻之蒲且子古之善弋者也挽纎弱之弓連雙鶬於青雲之際蓋以挽弓之力有餘然後可以巧中而必獲也若乃力弱而弓強則戰悼惴栗之不暇何暇思獲舉是以推則農之治田不在連阡跨陌之多唯其財力相稱則豐穰可期也審矣地勢之宜篇第二夫山川原隰江湖藪澤其高下之勢既異則寒燠肥瘠各不同大率高地多寒泉冽而土冷傳所謂高山多冬以言常風寒也且易以旱乾闕饒易以淹浸故治之各有宜也若髙田闕髙水所會歸之處量其所用而鑿為陂塘約十畝田即損二三畝以瀦畜水春夏之交雨水時至高大其隄深闊其中俾寬廣足以有容隄之上疏植桑柘可以繫牛牛得涼蔭而遂性隄得牛踐而堅實桑得肥水而沃美旱即決水以灌溉潦即不致於瀰漫而害稼高田旱稻自種至收不過五六月其間旱乾不過灌溉四五次此可力致其常稔也又田方耕時大為塍壟俾牛可牧其上踐踏堅實而無滲漏若塍壟地勢高下適等即併合之使田丘闊而緩牛犂易以轉側也其下地易以淹浸必視其水勢衝突趨向之處高大墟岸環繞之其欹斜坡陀之處可種蔬茹麻麥粟豆兩傍亦可種桑牧牛牛得水草之便用力省而功兼倍也若深水藪澤則有葑田以木縛為田丘浮繫水面以葑泥附木架上而種藝之其木架田丘隨水高下浮泛自不淹溺周禮所謂澤草所生種之芒種是也芒種有二義鄭謂有芒之種若今黃緑榖是也一謂待芒種節過乃種今人占候夏至小滿至芒種節則大水已過然後以黃緑榖種之於湖闕芒之種與芒種節候二義可並用也黃闕種以至收刈不過六七十日亦以避水溢之患也稻人掌稼下地以瀦畜水使其聚也以防止水使不溢也以遂均水使勢分也以列舍水使其去也以澮潟水溝之大者也其制如此可謂備矣尚何水溢之患耶詩稱多黍多稌以言高下咸得其宜今雖未能盡如古制亦可參酌依倣之也耕耨之宜篇第三夫耕耨之先後遲速各有宜也旱田穫刈才畢隨即耕治晒暴加糞壅培而種豆麥蔬茹因以熟土壤而肥沃之以省來嵗功役且其收足又以助嵗計也晚田宜待春乃耕為其藁秸柔韌必待其朽腐易為牛力山川原隰多寒經冬深耕放水乾涸雪霜凍沍土壤蘇碎當始春又遍布朽剃腐草敗葉以燒治之則土暖而苖易發作寒泉雖冽不能害也若不能然則寒泉常浸土脈冷而苖稼薄矣詩稱有冽氿泉無浸穫薪冽彼下泉浸彼苞稂苞蕭苞蓍蓋謂是也平陂易野平耕而深浸即草不生而水亦積肥矣俚語有之曰春濁不如冬清殆謂是也將欲播種撒石灰渥漉泥中以去蟲螟之害天時之宜篇第四四時八節之行氣候有盈縮畸贏之度五運六氣所主隂陽消長有太過不及之差其道甚微其效甚著蓋萬物因時受氣因氣發生理固不易測也若仲冬而李梅實季秋而昆蟲不蟄藏類可見矣天反時為災地反物為妖災妖之生不虛其應者氣類召之也隂陽一有愆忒則四序亂而不能生成萬物寒暑一失代謝即節候差而不能運轉一氣在耕稼盜天地之時利可不知耶傳曰不先時而起不後時而縮故農事必知天地時宜則生之蓄之長之育之成之熟之無不遂矣由庚萬物得由其道崇丘萬物得極其高大由儀萬物之生各得其宜者謂天地之間物物皆順其理也故堯命羲和厯象日月星辰以欽授民時俾咸知東作南訛西成朔易之候稽之天文則星鳥星火星虛星昴于是乎審矣驗之物理則鳥獸孳尾希革毛毨氄毛亦以詳矣而厥民析因夷隩可得而稽倣之也大則取象乎天地無乖升降之機明則取法乎日星不亂經營之度定之以時應之以數此古聖勤民旨意豈率然哉其所以時和嵗豐良由於此今人雷同以建寅之月朔為始春建已之月朔為首夏殊不知隂陽有消長氣候有盈縮冒昧以作事其克有成耶設或有成亦幸而已其可以為常耶聖王之蒞事物皆設官分職以掌之各置其官師以教導之農師之職其可已耶春秋之時法度並廢宜凶荒薦至乃書有年書大有年蓋幸而書之抑見天道有常而人自愆忒也詩稱豐年穰穰其崇如墉其比如櫛以言其得法度時宜故豐登有常也洪範九疇彛倫攸敘則百榖用成彛倫攸斁則百榖用不成然則順天地時利之宜識隂陽消長之理則百榖之成斯可必矣古先哲王所以班朔明時者匪直大一統也將使斯民知謹時令樂事赴功也故農事以先知備豫為善六種之宜篇第五種蒔之事各有攸敘能知時宜不違先後之序則相繼以生成相資以利用種無虛日收無虛月一嵗所資綿綿相繼尚何匱乏之足患凍餒之足憂哉正月種麻枲間旬一糞五六月可刈矣漚剝緝績以為布婦功之能事也二月種粟必疏闕子碾以轆軸則地緊實科本鬯茂穡穟長大而堅實七月可濟乏絶矣油麻有早晚二等三月種早麻才甲拆即耘鉏令苖稀疏一月凡三耘鉏則茂盛七八月可收也四月種豆耘鉏如麻七月成熟矣五月中旬後種晚油麻治如前法九月成熟矣不可太晚晚則不實畏霧露蒙羃之也早麻白而纒莢者佳謂之纒莢麻晚麻名葉裏熟者最佳謂之烏麻油最美也其類不一唯此二者人多種之凡收刈麻必堆罨一二夕然後卓架晒之即再傾倒而盡矣久罨則油暗五月治地唯要深熟於五更乘露鉏之五七遍即土壤滋潤纍加糞壅又復鉏轉七夕已後種蘿蔔菘菜即科大而肥美也篩細糞和種子打壟撮放唯疏為妙燒土糞以糞之霜雪不能凋雜以石灰蟲不能蝕更能以鰻鱺魚頭骨煮汁潰種尤善七月治地屢加糞鉏轉八月社前即可種麥宜屢耘而屢糞麥經兩社即倍收而子顆堅實詩曰十月納禾稼黍稷穜稑禾麻菽麥無不畢有以資嵗計尚何窮匱乏絶之患耶居處之宜篇第六先王居四民時地利亦必有道矣制闕二畝半在鄽詩云入此室處者是也闕田詩云中田有廬者是也方于耜舉趾之時出居中田之廬以便農事俾采荼薪樗以給農夫治場為圃以種蔬茹詩所謂疆場有瓜是也又墻下植桑以便育蠶古人治生之理可謂曲盡矣至九月築圃為場十月而納禾稼則嵗事畢矣春耕種形足以勞動秋收斂亦可以休息矣于是扶老携幼入室處以久居中田之廬則鄽居荒而不治于是穹窒熏鼠塞向墐户也國語載管仲居四民各有攸處不使龎雜欲其業専不為異端紛更其志也違寒就溫去勞就逸所以處之各得其宜此先王愛民之政也今雖不能如是要之民居去田近則色色利便易以集事俚諺有之曰近家無瘦地遙田不富人豈不信然糞田之宜篇第七土壤氣脈其類不一肥沃磽埆美惡不同治之各有宜也且黑壤之地信美矣然肥沃之過或苖茂而實不堅當取生新之土以解利之即疏爽得宜也磽埆之土信瘠惡矣然糞壤滋培即其苖暢茂而實堅栗也雖土壤異宜顧治之如何耳治之得宜皆可成就周禮草人掌土化之法以物地相其宜而為之種别土之等差而用糞治且土之騂剛者糞宜用牛赤緹者糞宜用羊以至墳壤用麋渴澤用鹿鹹潟用貆勃壤用狐埴壚用豕疆㯺用蕡輕爂用犬皆相視其土之性類以所宜糞而糞之斯得其理矣俚諺謂之糞藥以言用糞猶用藥也凡農居之側必置糞屋低為簷楹以避風雨飄浸且糞露星月亦不肥矣糞屋之中鑿為深池甃以磚甓勿使滲漏凡掃除之土燒燃之灰簸揚之粳粃斷藁葉積而焚之沃以糞汁積之既久不覺其多凡欲播種篩去瓦石取其細者和勻種子疏把撮之待其苖長又撒以壅之何患收成不倍厚也哉或謂土敝則草木不長氣衰則生物不遂凡田土種三五年其力已乏斯説殆不然也是未深思也若能時加新沃之土壤以糞治之則益精熟肥美其力當常新壯矣抑何敝何衰之有薅耘之宜篇第八詩云以薅荼蓼荼蓼朽止黍稷茂止記禮者曰仲夏之月利以殺草可以糞田疇可以美土疆今農夫不知有此乃以其耘除之草拋棄它處而不知和泥渥濁深埋之稻苖根下漚罨既久即皆浥爛而泥土肥美嘉榖蕃茂矣然除草之法亦自有理周官剃氏掌殺草于春始生而萌之於夏日至而夷剗平治之俾不茂盛也日至而耜之謂所種者已收成矣即併根荄犁鉏轉之俾雪霜凍沍根荄腐朽來嵗不復生又因得以糞土田也春秋傳曰農夫之務去草也芟夷藴崇之絶其本根勿使能殖則善者信矣以言盡去稂莠即可以望嘉榖茂盛也古人留意如此而今人忽之其可乎且耘田之法必先審度形勢自下及上旋乾旋耘先於最上處收滀水勿致水走失然後自下旋放令乾而旋耘不問草之有無必遍以手排摝務令稻根之傍液液然而後已所耘之田隨於中間及四傍為深大之溝俾水竭涸泥坼裂而極乾然後作起溝缺次第灌溉夫已乾燥之泥驟得雨即蘇碎不三五日間稻苖蔚然殊勝于用糞也又次第從下放上耘之即無鹵莽滅裂之病田乾水暖草死土肥浸灌有漸即水不走失如此思患預防何為而不得今恆見農者不先自上滀水自下耘上乃頓然放闕務令速了及工夫不逮恐泥乾堅難耘摝則必率略未免滅裂土未及乾甚欲水灌溉已不可得遂致旱涸焦枯無所措手如是失者十常八九終不省悟可勝嘆哉節用之宜篇第九古者一年耕必有三年之食三年耕必有九年之食以三十年之通雖有旱乾水溢民無菜色者良有以也冢宰視年之豐凶以制國用量入以為出豐年不奢凶年不儉祭用數之仂而又九賦九貢九式均節各有條敘不相互用此理財之道故有常也國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也治家亦然今嵗計常用與夫備倉卒非常之用每每計置萬一非常之事出于意外亦素有其備不致侵過常用以至闕乏亦以此也今之為農者見小近而不慮久逺一年豐稔沛然自足棄本逐末侈費妄用以快一日之適其間有收刈甫畢無以糊口者其能給終嵗之用乎衣食不給日用既乏其能守常心而不為不義者乎蓋亦鮮矣傳曰收斂蓄藏節用御欲則人不能使之貧養偹動時則天不能使之病豈不信然又曰約有者囷窖箱篋之藏然而衣不敢有絲帛行不敢有輿馬非不欲也幾不長慮而恐無以繼之也春秋傳曰儉德之共也侈惡之大也語曰禮與其奢也寧儉奢則不孫儉則固與其不孫也寧固易曰君子用過乎儉聖人之訓誡如此儉雖若固陋然不猶愈于奢而不孫為惡之大者耶然以禮制事而用之適中俾奢不至過泰儉不至過陋不為苦節之凶而得甘節之吉是謂稱事之情而中理者也詩云儉以足用以言唯儉為能常足用而不至於匱乏語云以約失之者鮮亦此之謂也易傳曰君子安不忘危存不忘亡治不忘亂是以身安而國家可保也又曰理財正辭禁民為非曰義以謂理財之道在上以率之民有侈費妄用則嚴禁之夫是之謂制得其宜矣老子曰能知其所不知者上也不能知其所不知者病矣夫惟病病是以不病聖人不病以其病病是以不病夫能如此孰有倉卒窘迫之患哉稽功之宜篇第十好逸惡勞者常人之情偷惰茍簡者小人之病殊不知勤勞乃逸樂之基也詩不云乎始於憂勤終于逸樂故美萬物盛多彼小人務知小者近者偷惰茍簡狃于常情上之人儻不知稽功會事以明賞罰則何以勸沮之哉譬之駕馭駑蹇鞭䇿不可弛廢也易曰君子以勞民勸相大司徒之職曰以擾萬民勞之乃所以逸之擾之乃所以安之也載師凡宅不毛者有里布謂罰以一里二十五家之泉也凡田不耕者出屋粟謂空田者罰以三家之稅粟也凡民無職事者出夫家之征謂雖有間民無職事者猶當出夫稅家稅也閭師凡無職者出夫布凡庶民不畜者祭無牲不耕者祭無盛不植者無椁不蠶者不帛不績者不衰此先王之于民困之如此歎之又如此夫孰為厲已哉凡欲振發而飭興其蠱弊俾率作興事耳此其所以地無遺利土無不毛尚豈有惰遊徇末忘本而田萊多荒之患哉斯民也寧復有餓莩流離困苦之患哉昔漢文帝下勸農之詔曰雕文刻鏤傷農事也錦繡纂組害女工也農事傷則飢之本也女工害則寒之原也一夫不耕天下有受其飢者一婦不蠶天下有受其寒者然崇本抑末之道要在明勸沮之方而已況國家之於農大則遣使次則命官主管其事然則在其位者可不舉其職而任其責哉器用之宜篇第十一工欲善其事必先利其器器茍不利未有能善其事者也利而不偹亦不能濟其用也詩曰庤乃錢鎛奄觀銍艾傳曰收而場工偫而畚梮時雨既至挾其槍刈耨鎛以旦暮從事於田野當是時也器可以不偹具以供其用耶故凡可以適用者要當先時豫偹則臨事濟用矣茍一器不精即一事不舉不可不察也念慮之宜篇第十二凡事豫則立不豫則廢求而無之實難過求何害農事尤宜念慮者也孟子曰農夫豈為出疆捨其耒耜哉常人之情多于間裕之時因循廢事惟志好之行安之樂言之念念在是不以須臾忘廢料理緝治即日成一日嵗成一嵗何為而不充足偹具也彼惑于多岐而不専一溺于茍且而不精緻旋得旋失烏知積小以成大積微以至著在吾志之不少忘哉若夫間暇之時放逸委棄臨事之際勉強應用愚未知其可也大率常人之情志驕于業泰體逸于時安有能沐浴膏澤而歌詠勤苦則衆必指以為汨汨不適時者也其亦不思之甚矣右十有二宜或有未曲盡事情者今再敘論數篇于後庶纎悉畢偹而無遺闕以乏常用云爾祈報篇記曰有其事必有其治故農事有祈焉有報焉所以治其事也載芟之詩春籍田而祈社稷良耜之詩於秋冬所以報也則祈報之義凡以治其事者可知矣匪直此也凡法施于民者以勞定國者能禦大災者能捍大患者皆在所祈報也故山川之神則水旱癘疫之災于是乎禜之日月星辰則雪霜風雨之不時于是乎禜之是以先王載之典禮著之令式而秩祀焉凡以為民祈報也籥章凡國祈年于田祖則吹豳雅擊土鼓以樂田畯爾雅謂田畯乃先農也于先農有祈焉有報焉則神農后稷與夫俗之流傳所謂田父田母舉在所祈報可知矣大田之詩言去其螟螣及其蟊賊無害我田稚田祖有神秉畀炎火有淹淒淒興雨祁祁雨我公田遂及我私是又祈之之詞也甫田之詩言以我齊明與我犧羊以社以方我田既臧農夫之慶是又報之之禮也繼而曰琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以穀我士女饁彼南畝田畯至喜于此又以見祈報之事也噫嘻之詩言春夏祈穀于上帝者春祈穀于上帝夏大雩于上帝之樂歌也噫嘻成王既昭格爾者嗟歎以告于上帝也言天之所以成王之業者莫不自于遂百穀以富其民也于是欽授民事而率是農夫播厥百穀駿發爾私終三十里亦服爾耕十千為耦焉其詩嗟歎不敢後於天時所以虔於天澤也溥天之下莫不如是則嵗有不豐者乎此王者所以上能順于天下能順于民以成王業故曰明昭上帝迄用康年也若豐年之詩言秋冬報者蓋五行得性而萬物適其宜五氣若時而百榖倍其實故陸禾之數非一而多者黍也水榖之品亦非一而多者稌也則其它從可知矣故亦有高廪萬億及秭于是為酒為醴蒸畀祖妣以洽百禮莫不腆厚有以報其盛而薦其誠是以神降之福孔及于兆民焉大祝掌六祝之辭以事鬼神示祈福祥求永貞掌六祈以同鬼神示則類造攻説禬禜于是乎治其事矣小祝掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌災兵逺罪疾舉是以言則順時祈報禬禳之事先王所以媚于神而和于人皆所以與民同吉凶之患者也凡在祀典烏可廢耶禳田之祝烏可已耶記不云乎昔伊耆氏之始為蠟也于嵗之十二月合聚萬物而索饗之也主先嗇而祭司嗇也祭之以百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也古之君子使之必報之迎貓為其食田鼠也迎虎為其食田豕也迎而祭之也繼而曰祭坊與水庸事也其祝之之辭曰土反其宅水歸其壑昆蟲無作草木歸其澤凡此皆祈之之辭也春秋有一蟲獸之為災害一雨暘之致愆忒則必雩禜之而特書之以見先王勤恤民隱無所不用其至也夫惟如此此其所以萬物之生各得其宜各極其高大各由其道物無天閼疵癘民無札瘥災害者莫不由神降其福以相之而然也今之從事于農者類不能然借或有一焉則勉強茍且而已烏能悉循用先王之典故哉其于春秋二時之社祀僅能舉之至于祈報之禮蓋蔑如也其所以頻年水旱蟲蝗為災害飢饉荐臻民卒流亡未必不由失祈報之禮而匱神乏祀以致其然夫養馬一事也于春則祭馬祖夏祭先牧秋祭馬社冬祭馬步此所以馬得其牧養而無疫癘抑以四時祭祀祈禱而然也至於牛最農事之急務田畝賴是而後治其牧養盍亦如馬之祈禱以祛禍祈福則必博碩肥腯不疾瘯蠡矣年來耕牛疫癘殊甚至有一鄉一里靡有孑遺者農夫困苦莫此為甚因附其説幸覽者繹味而深察之以祈福禳禍于救弊其庶幾焉善其根苖篇凡種植先治其根苖以善其本本不善而末善者鮮矣欲根苖壯好在夫種之以時擇地得宜用糞得理三者皆得又從而勤勤顧省修治俾無旱乾水潦蟲獸之害則盡善矣根苗既善徙植得宜終必結實豐阜若初根苖不善方且萎悴微弱譬孩孺胎病氣血枯瘠困苦不暇雖日加拯救僅延喘息欲其充實蓋亦難矣今夫種榖必先修治秧田於秋冬即再三深耕之俾霜雪凍沍土壤蘇碎又積腐藁敗葉剗剃枯朽根荄遍鋪燒治即土暖且爽于始春又再三耕耙轉以糞壅之若用麻枯尤善但麻枯難使須細杵碎和火糞窖罨如作麯樣候其發熱生鼠毛即攤開中間熱者置四傍收斂四傍冷者置中間又堆窖罨如此三四次直待不發熱乃可用不然即燒殺物矣切勿用大糞以其甕腐芽蘗又損人腳手成瘡痍難療唯火糞與燖豬毛及窖爛粗榖殼最佳亦必渥漉田精熱了乃下粳糞踏入泥中蕩平田面乃可撒榖種又先看其年氣候早晚寒暖之宜乃下種即萬不失一若氣候尚有寒當且從容熟治苖田以待其暖則力役寬裕無窘迫滅裂之患得其時宜即一月可勝兩月長茂且無疏失多見人才暖便下種不測其節候尚寒忽為暴寒所折芽蘖凍爛甕臭其苖田已不復可下種乃始别擇白田以為秧地未免忽略如此失者十常三四間嵗如此終不自省乃復罪嵗誠愚癡也若不得已而用大糞必先以火糞久窖罨乃可用多見人用小便生澆灌立見損壞大抵秧田愛往來活水怕冷漿死水青苔薄附即不長茂又須隨撒種闊狹更重圍繞作塍貴闊則約水深淺得宜若才撒種子忽暴風却急放乾水免風浪淘蕩聚却榖也忽大雨必稍增水為暴雨漂颭浮起榖根也若晴即淺水從其晒暖也然淺不可太淺太淺即泥皮乾堅深不可太深太深即浸沒沁心而萎黃矣唯淺深得宜乃善農書卷上
