body:
  text: 農書卷中宋陳敷撰牛說或問牛與馬適用於世孰先孰後孰緩孰急孰輕孰重是何馬貴重如彼而牛之輕慢如此答曰二物皆世所資賴而馬之所直或相倍蓰或相什伯或相千萬以夫貴者乘之三軍用之芻秣之精教習之適養治之至駕馭之良有圉人校人馭夫馭僕専掌其事此馬之所以貴重也牛之為物駕車之外獨用于農夫之事耳牧之于蒿萊之地用之于田野之間勤者尚或顧省之惰者漫不加省飢渴不之知也寒暑不之避也疫癘不之治也困踣不之恤也豈知農者天下之大本衣食財用之所從出非牛無以成其事耶較其輕重先後緩急宜莫大于此也夫欲播種而不深耕熟耰之則食用何自而出食用乏絶即養生何所賴傳曰衣食足知榮辱倉廪實知禮節又曰禮義生于富足盜竊起于貧窮惟富足貧窮禮義盜竊之由皆農畝之所致也馬必待富足然後可以養治繇此推之牛之功多于馬也審矣故愚著為之說以次農事之後牧養役用之宜篇第一夫善牧養者必先知愛重之心以革慢易之意然何術而能俾民如此哉必也在上之人貴之重之使民不敢輕愛之養之使民不敢殺然後慢易之意不生矣視牛之飢渴猶已之飢渴視牛之困苦羸瘠猶已之困苦羸瘠視牛之疫癘若已之有疾也視牛之字育若已之有子也苟能如此則牛必蕃盛滋多奚患田疇之荒蕪而衣食之不繼乎且四時有溫暑凉寒之異必順時調適之可也于春之初必盡去牢欄中積滯蓐糞亦不必春也但旬日一除免穢氣蒸鬱以成疫癘且浸漬蹄甲易以生病又當祓除不祥以淨爽其處乃善方舊草朽腐新草未生之初取潔淨藁草細銼之和以麥麩榖糠或豆使之微濕槽盛而飽飼之豆仍破之可也藁草須以時暴乾勿使朽腐天氣寒冷即處之燠暖之地煮糜粥以啖之即壯盛矣亦宜預收豆楮之葉與黃落之桑舂碎而貯積之天寒即以米泔和銼草糠麩以飼之春夏草茂放牧必恣其飽每放必先飲水然後與草則不腹脹又刈新芻雜舊藁銼細和勻夜餧之至五更初乘日未出天氣凉而用之即力倍于常半日可勝一日之功日髙熱喘便令休息勿竭其力以致困乏時其飢渴以適其性則血氣常壯皮毛潤澤力有餘而老不衰矣其血氣與人均也勿犯寒暑情性與人均也勿使太勞此要法也當盛寒之時宜待日出晏溫乃可用至晚天隂氣寒即早息之大熱之時須夙餧令飽健至臨用時不可極飽飽即役力傷損也如此愛護調養尚何困苦羸瘠之有所以困苦羸瘠者以苟目前之急而不顧恤之也古人卧牛衣而待旦則牛之寒蓋有衣矣飯牛而牛肥則牛之瘠餒蓋啖以菽粟矣衣以褐薦飯以菽粟古人豈重畜如此哉以此為衣食之根本故也彼藁秸不足以充其飢水漿不足以禦其渴天寒嚴凝而凍栗之天時酷暑而曬暴之困瘠羸劣疫癘結瘴以致斃踣則田畝不治無足怪者且古人分田之制必有萊牧之地稱田而為等差故養牧得宜博碩肥腯不疾瘯蠡也觀宣王考牧之詩可知矣其詩曰誰謂爾無牛九十其犉爾牛來思其耳濕濕以見其牧養得宜故字育蕃息也或降于阿或飲于池或寢或訛以見其水草調適而遂性也爾牧來斯矜矜兢兢揮之以肱畢來既升以見其愛之重之不驚擾之也後世無萊牧之地動失其宜又牧人類皆頑童茍貪嬉戲往往慮其奔逸繫之隱蔽之地其肯求牧于豐芻清澗俾無飢渴之患耶飢渴莫之顧恤及其瘦瘠從而役使困苦之鞭撻趂逐以徇一時之急日云暮矣氣喘汗流其力竭矣耕者急于就食往往逐之水中或放之山上牛困得水動輒移時毛竅空疏因而乏食則瘦瘠而病矣放之髙山筋骨疲乏遂有顛跌僵仆之患愚民無知乃始祈禱巫祝以幸其生而不知所以然者人事不修以致此也醫治之宜篇第二周禮獸醫掌療獸病凡療獸病灌而行之以發其惡然後藥之養之其來尚矣然牛之病不一或病草脹或食雜蟲以致其毒或為結脹以閉其便溺冷熱之異須識其端其用藥與人相似也但大為之劑以灌之即無不愈者其便溺有血是傷于熱也以便血溺血之藥大其劑灌之冷結即鼻乾而不喘以發散藥投之熱結即鼻汗而喘以解利藥投之脹即疏通毒即解利若每能審理以節適何病之足患哉今農家不知此說謂之疫癘方其病也薰蒸相染盡而後已俗謂之天行唯以巫祝禱祈為先至其無驗則置之于無可奈何又已死之肉經過村里其氣尚能相染也欲病不相染勿令與不病者相近能適時養治如前所說則無病矣今人有病風病勞病腳皆能相傳染豈獨疫癘之氣薰蒸也哉傳曰養備動時則天不能使之病然已病而治猶愈于不治也農書卷中
