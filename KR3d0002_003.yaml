front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0002_WYG_003-1a, image: WYG0730/WYG0730-0187a.png}
body:
  text: 農書卷下宋陳旉撰蠶桑叙古人種桑育蠶莫不有法不知其法未有能得者縱或得之亦幸而已矣盖法可以為常而幸不可以為常也今一或幸焉則曰是無法也或未盡善而失之則亦曰法不足恃也故愚備論之以次牛説之後種桑之法篇第一種桑自本及末分為三叚若欲種椹子則擇羙桑種椹毎一枚剪去兩頭兩頭者不用為其子差細以種即成雞桑花桑故去之唯取中間一截以其子堅栗特大以種即其榦强實其葉肥厚故存之所存者先以柴灰淹揉一宿次日以水淘去輕秕不實者擇取堅實者略曬乾水脉勿令甚燥種乃易生預擇肥壤土鉏而又糞糞畢復鉏如此三四轉踏令小緊平整了乃于地面匀薄布細沙約厚寸許然後于沙上匀布椹子令疎密得所下子了又以薄沙摻盖其上即疎爽而子易生芽蘖不為泥瓮腐而根漸蝕下所踏實者肥壤中則易以長茂矣毎畦闊叄尺其長稱焉一畦只可種四行即便於澆灌又易採除草畦上作棚高三尺棚上略薄著草盖却如種薑棚様以防黄梅時連雨後忽暴日晒損也待苖長三五寸即勤剔摘去根榦四傍樸蔌小枝葉只存直上者榦標葉五七日一次以水解小便澆沃即易長此第一叚也至當年八月上旬擇陽顯滋潤肥沃之地深鉏以肥窖燒過土糞以糞之則雖乆雨亦疎爽不作泥淤沮洳乆乾亦不致堅硬磽埆也雖甚霜雪亦不凝凛凍冱治溝壟町畦須疎密得宜然後取起所種之苖就根頭盡削去榦只留根又削去對榦一條直下者命根只留四傍根每三根合作一株若品字様繋縛著一竹筒底下筒各長三尺大如脚拇指盡劚去中心節令透徹底一一繋縳了然後行列并竹筒植之可相距二尺許一株俾三根日乆竹筒朽腐自然三榦合為一榦以三根共䕃一榦植未逾數月榦力専厚易長大矣毎一竹筒口㝷常以瓦子一片盖却免雨水得入漬爛之也覺乆須澆灌即揭起瓦片子以瓶酌小便從竹筒中下直至根底矣澆畢依前以瓦片子盖筒口但不必如前種苖様作棚也又須時時摘去榦之四傍枝葉謂之妬芽恐分其力以害榦此第二叚也于次年正月上旬徙植削去太半條榦先行列作穴毎相距二丈許深廣各七尺穴中填以碎瓦石約六七分滿乃下肥火糞三兩檐于穴中所填者碎瓦石上然後於穴中央植一株下土平填緊築免風揺動更四畔以椀足大木子四五條長三尺餘斫槧周廻牢釘以輔助其榦仍以棘刺絆縳遶護免牛羊挨拶損動也根下得瓦石即虚疏作不泥糞落其中又引其根易以行待數月根行矣乃于四傍以大木斫槧周廻釘穴揺動為十數穴穴可深三四尺又四圍略高作塘塍貴得澆灌時不流走了糞且䕃注四傍直從穴中下至根底即易發旺而嵗乆難摧也又時時㸔蟲恐蝕損仍剔摘去細枝葉謂之妬條若桑圃在曠野處即毎嵗于六七月間必鉏去其下草免引蟲援上蝕損至十月又併其下腐草敗葉鉏轉藴積根下謂之罨蘀最浮泛肥羙也至来年正月間斫剔去枯摧細枝雖大條之長者亦斫去其半即氣浹而葉濃厚矣大率斫桑要得漿液未行不犯霜雪寒雨斫之乃佳若漿液已行而斫之即滲溜損最不宜也纔斫了便鉏開根下糞之謂之開根糞則是毎嵗兩次鉏糞耳此第三叚也又有一種海桑本自低亞若欲壓條即于春初相視其低近根本處條以竹木鈎鈎釘地中上以肥潤土培之不三兩月生根矣次年鑿斷徙植尤易于種椹也若欲接揷即别取好桑直上生條不用横垂生者三四寸長截如接果子様接之其葉倍好然亦易衰不可不知也湖中安吉人皆能之彼中人唯藉蠶辦生事十口之家養蠶十箔毎箔得繭一十二斤毎一斤取絲一兩三分每五兩絲織小絹一疋毎一疋絹易米一石四㪷絹與米價常相侔也以此嵗計衣食之給極有凖的也以一月之勞賢于終歳勤動且無旱乾水溢之苦豈不優裕也哉前所謂毎嵗兩次糞鉏乃桑圃之逺于家者如此若桑圃近家即可作墻籬仍更疎植桑令畦壟差闊其下徧栽苧因糞苧即桑亦獲肥益矣是兩得之也桑根植深苧根植淺並不相妨而利倍差且苧有數種唯延苧最勝其皮薄白細軟宜緝績非麄澁赤硬比也糞苧宜麄爛榖殻糠藁若能勤糞治即一嵗三收中小之家只此一件自可了納賦稅充足布帛也聚糠藁法于厨棧下深闊鑿一池結甃使不滲洩毎舂米即聚礱簸殻及腐藁敗葉漚漬其中以收滌器肥水與滲漉泔淀漚乆自然腐爛浮泛一嵗三四次出以糞苧因以肥桑愈乆而愈茂寧有荒廢枯摧者作一事而兩得誠用力少而見功多也僕毎如此為之比隣莫不歎異而胥傚也收蠶種之法篇第二人多收蠶種于篋中經天時雨濕熱蒸寒燠不時即罨損浙人謂之蒸布以言在卵布中已成其病其苖出必黄苖黄即不堪育矣譬如嬰兒在胎中受病出胎便病難以治也凡收蠶種之法以竹架疎疎垂之易見風日又擘緜冪之勿使飛蝶綿蟲食之待臘日或臘月大雪即鋪蠶種于雪中令雪壓一日乃復攤之架冪之如初至春候其欲生未生之間細研朱砂調温水浴之水不可冷亦不可熱但如人體斯可矣以辟其不祥也次治明密之室不可漏風以糠火温之如春三月然後置種其中以無灰白帋藉之斯出齊矣先未出時秤種冩記輕重于紙背及已出齊慎勿掃多見人纔見蠶出便即以箒刷或以雞鵞翎掃之夫以㣲渺如絲髮之弱其能禁箒刷之傷哉必細切葉别布白紙上務令匀薄却以出苗和紙覆其上蠶喜葉香自然下矣却再秤元種帋見所下多少約計自有葉㸔養寧葉多而蠶少即優裕而無窘廹之患乃善今人多不先計料至闕葉則典質貿鬻之無所不至苦于蠶受飢餒雖費資産不敢悋也縱或得之已不償所費且狼籍損壊枉損物命多矣一或不得遂失所望可不戒哉又有一種原蠶謂之再生言放子後随即再出也切不可育既損壊葉條且狼籍作踐其絲且不耐衣著所損多而為利少育之何益也育蠶之法篇第三凡育蠶之法須自摘種若買種鮮有得者何哉夫蠶蛾有隔一二日出者有隔三五日出者蛾出不齊則放子先後亦不齊矣其收種者取參差未齊之時别紙摘之及正中間放子齊時又别作一紙摘之及末後放子稍遲又别作一紙摘之凡鬻與人皆首尾前後不齊者而中間齊者留以自用始摘不齊則苖出不齊蠶之眠起遂分數等有正眠者有起而欲食者有未眠者放食不齊此所以得失相半也若自摘種必擇繭之早晩齊者則蛾出亦齊矣蛾出既齊則摘子亦齊矣摘子既齊則出苗亦齊矣出苗既齊勤勤疎撥則食葉匀矣食葉既匀則再眠起等矣三眠之後晝三與食葉必薄而使食盡非唯省葉且不罨損蠶將飽必勤視去糞薙此育蠶之法也用火採桑之法篇第四蠶火類也宜用火以養之而用火之法須别作一小鑪令可擡舁出入蠶既鋪葉餵矣待其循葉而上乃始進火火須在外燒令熟以穀灰盖之即不暴烈生熖纔食了即退火鋪葉然後進火每每如此則蠶無傷火之患若蠶饑而進火即傷火若纔鋪葉蠶猶在葉下未能循援葉上而進火即下為糞薙所蒸上為葉蔽遂有熱蒸之患又須勤去沙薙最怕南風若天氣鬱蒸即略以火温解之以去其濕蒸之氣略疏通窻戸以快爽之沙薙必逺放為其蒸熱作氣也最怕濕熱及冷風傷濕即黄肥傷風即節髙沙蒸即脚腫傷冷即亮頭而白蜇傷火即焦尾又傷風亦黄肥傷冷風即黒白紅僵能避此數患乃善又須先治葉室必深宻凉燥而不蒸濕下作架髙五六寸上鋪新簟然後置葉其上勿使通風通風即葉易乾槁常收三日葉以備雨濕則蠶常不食濕葉且不失饑矣外採葉歸必疎爽於葉室中以待其熱氣退乃可與食若便與食則上為葉熱下為沙濕蠶居其中遂成葉蒸矣蒸而黄雖救之亦失半簇箔藏繭之法篇第五簇箔宜以杉木解枋長六尺闊三尺以箭竹作馬眼隔挿茅疎密得中復以無葉竹篠縱横撘之又簇背鋪以蘆箔而以篾透背面縛之即蠶可駐足無跌墜之患且其中深穏稠密旋旋放蠶其上初略欹斜以竢其糞盡㣲以熟灰火温之待入網漸漸加火不宜中輟稍冷即游絲亦止繰之即斷絶多煑爛作絮不能一緒抽盡矣纔拆下箔即急剥去繭衣免致蒸壊如多即以鹽藏之蛾乃不出且絲柔韌潤澤也藏繭之法先晒繭令燥埋大甕地上甕中先鋪竹簀次以大桐葉覆之乃鋪繭一重以十斤為率摻鹽二兩上又以桐葉平鋪如此重重隔之以至滿瓮然後密盖以泥封之七日之後出而澡之頻頻換水即絲明快随以火焙乾即不黯斁而色鮮潔也農書卷下
