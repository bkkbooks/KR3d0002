front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0002_WYG_003-1a, image: WYG0730/WYG0730-0187a.png}
body:
  text: 農書卷下宋陳敷撰蠶桑敘古人種桑育蠶莫不有法不知其法未有能得者縱或得之亦幸而已矣蓋法可以為常而幸不可以為常也今一或幸焉則曰是無法也或未盡善而失之則亦曰法不足恃也故愚備論之以次牛説之後種桑之法篇第一種桑自本及末分為三假若欲種椹子則擇美桑種椹每一枚剪去兩頭兩頭者不用為其子差細以種即成雞桑花桑故去之唯取中間一截以其子堅栗特大以種即其幹強實其葉肥厚故存之所存者先以柴灰淹揉一宿次日以水淘去輕秕不實者擇取堅實者略曬乾水脈勿令甚燥種乃易生預擇肥壤土鉏而又糞糞畢復鉏如此三四轉踏令小緊平整了乃于地面勻薄布細沙約厚寸許然後于沙上勻布椹子令疏密得所下子了又以薄沙摻蓋其上即疏爽而子易生芽蘖不為泥甕腐而根漸蝕下所踏實者肥壤中則易以長茂矣每畦闊叄尺其長稱焉一畦只可種四行即便於澆灌又易採除草畦上作棚高三尺棚上略薄著草蓋却如種薑棚樣以防黃梅時連雨後忽暴日晒損也待苖長三五寸即勤剔摘去根幹四傍朴蔌小枝葉只存直上者幹標葉五七日一次以水解小便澆沃即易長此第一假也至當年八月上旬擇陽顯滋潤肥沃之地深鉏以肥窖燒過土糞以糞之則雖久雨亦疏爽不作泥淤沮洳久乾亦不致堅硬磽埆也雖甚霜雪亦不凝凛凍沍治溝壟町畦須疏密得宜然後取起所種之苖就根頭盡削去幹只留根又削去對幹一條直下者命根只留四傍根每三根合作一株若品字樣繫縛著一竹筒底下筒各長三尺大如腳拇指盡劚去中心節令透徹底一一繫縳了然後行列并竹筒植之可相距二尺許一株俾三根日久竹筒朽腐自然三幹合為一幹以三根共蔭一幹植未逾數月幹力専厚易長大矣每一竹筒口尋常以瓦子一片蓋却免雨水得入漬爛之也覺久須澆灌即揭起瓦片子以瓶酌小便從竹筒中下直至根底矣澆畢依前以瓦片子蓋筒口但不必如前種苖樣作棚也又須時時摘去幹之四傍枝葉謂之妬芽恐分其力以害幹此第二假也于次年正月上旬徙植削去太半條幹先行列作穴每相距二丈許深廣各七尺穴中填以碎瓦石約六七分滿乃下肥火糞三兩簷于穴中所填者碎瓦石上然後於穴中央植一株下土平填緊築免風搖動更四畔以碗足大木子四五條長三尺餘斫槧周回牢釘以輔助其幹仍以棘刺絆縳繞護免牛羊挨拶損動也根下得瓦石即虛疏作不泥糞落其中又引其根易以行待數月根行矣乃于四傍以大木斫槧周回釘穴搖動為十數穴穴可深三四尺又四圍略高作塘塍貴得澆灌時不流走了糞且蔭注四傍直從穴中下至根底即易發旺而嵗久難摧也又時時看蟲恐蝕損仍剔摘去細枝葉謂之妬條若桑圃在曠野處即每嵗于六七月間必鉏去其下草免引蟲援上蝕損至十月又併其下腐草敗葉鉏轉藴積根下謂之罨蘀最浮泛肥美也至來年正月間斫剔去枯摧細枝雖大條之長者亦斫去其半即氣浹而葉濃厚矣大率斫桑要得漿液未行不犯霜雪寒雨斫之乃佳若漿液已行而斫之即滲溜損最不宜也才斫了便鉏開根下糞之謂之開根糞則是每嵗兩次鉏糞耳此第三假也又有一種海桑本自低亞若欲壓條即于春初相視其低近根本處條以竹木鈎鈎釘地中上以肥潤土培之不三兩月生根矣次年鑿斷徙植尤易于種椹也若欲接插即别取好桑直上生條不用橫垂生者三四寸長截如接果子樣接之其葉倍好然亦易衰不可不知也湖中安吉人皆能之彼中人唯藉蠶辦生事十口之家養蠶十箔每箔得繭一十二斤每一斤取絲一兩三分每五兩絲織小絹一匹每一匹絹易米一石四斗絹與米價常相侔也以此嵗計衣食之給極有凖的也以一月之勞賢于終歲勤動且無旱乾水溢之苦豈不優裕也哉前所謂每嵗兩次糞鉏乃桑圃之逺于家者如此若桑圃近家即可作墻籬仍更疏植桑令畦壟差闊其下遍栽苧因糞苧即桑亦獲肥益矣是兩得之也桑根植深苧根植淺並不相妨而利倍差且苧有數種唯延苧最勝其皮薄白細軟宜緝績非粗澀赤硬比也糞苧宜粗爛榖殼粳藁若能勤糞治即一嵗三收中小之家只此一件自可了納賦稅充足布帛也聚粳藁法于厨棧下深闊鑿一池結甃使不滲泄每舂米即聚礱簸殼及腐藁敗葉漚漬其中以收滌器肥水與滲漉泔淀漚久自然腐爛浮泛一嵗三四次出以糞苧因以肥桑愈久而愈茂寧有荒廢枯摧者作一事而兩得誠用力少而見功多也僕每如此為之比鄰莫不歎異而胥效也收蠶種之法篇第二人多收蠶種于篋中經天時雨濕熱蒸寒燠不時即罨損浙人謂之蒸布以言在卵布中已成其病其苖出必黃苖黃即不堪育矣譬如嬰兒在胎中受病出胎便病難以治也凡收蠶種之法以竹架疏疏垂之易見風日又擘綿冪之勿使飛蝶綿蟲食之待臘日或臘月大雪即鋪蠶種于雪中令雪壓一日乃復攤之架冪之如初至春候其欲生未生之間細研朱砂調溫水浴之水不可冷亦不可熱但如人體斯可矣以辟其不祥也次治明密之室不可漏風以粳火溫之如春三月然後置種其中以無灰白紙藉之斯出齊矣先未出時稱種寫記輕重于紙背及已出齊慎勿掃多見人才見蠶出便即以帚刷或以雞鵝翎掃之夫以微渺如絲髮之弱其能禁帚刷之傷哉必細切葉别布白紙上務令勻薄却以出苗和紙覆其上蠶喜葉香自然下矣却再稱元種紙見所下多少約計自有葉看養寧葉多而蠶少即優裕而無窘迫之患乃善今人多不先計料至闕葉則典質貿鬻之無所不至苦于蠶受飢餒雖費資産不敢吝也縱或得之已不償所費且狼籍損壞枉損物命多矣一或不得遂失所望可不戒哉又有一種原蠶謂之再生言放子後隨即再出也切不可育既損壞葉條且狼籍作踐其絲且不耐衣著所損多而為利少育之何益也育蠶之法篇第三凡育蠶之法須自摘種若買種鮮有得者何哉夫蠶蛾有隔一二日出者有隔三五日出者蛾出不齊則放子先後亦不齊矣其收種者取參差未齊之時别紙摘之及正中間放子齊時又别作一紙摘之及末後放子稍遲又别作一紙摘之凡鬻與人皆首尾前後不齊者而中間齊者留以自用始摘不齊則苖出不齊蠶之眠起遂分數等有正眠者有起而欲食者有未眠者放食不齊此所以得失相半也若自摘種必擇繭之早晚齊者則蛾出亦齊矣蛾出既齊則摘子亦齊矣摘子既齊則出苗亦齊矣出苗既齊勤勤疏撥則食葉勻矣食葉既勻則再眠起等矣三眠之後晝三與食葉必薄而使食盡非唯省葉且不罨損蠶將飽必勤視去糞剃此育蠶之法也用火採桑之法篇第四蠶火類也宜用火以養之而用火之法須别作一小爐令可擡舁出入蠶既鋪葉餵矣待其循葉而上乃始進火火須在外燒令熟以穀灰蓋之即不暴烈生熖才食了即退火鋪葉然後進火每每如此則蠶無傷火之患若蠶飢而進火即傷火若才鋪葉蠶猶在葉下未能循援葉上而進火即下為糞剃所蒸上為葉蔽遂有熱蒸之患又須勤去沙剃最怕南風若天氣鬱蒸即略以火溫解之以去其濕蒸之氣略疏通窗戶以快爽之沙剃必逺放為其蒸熱作氣也最怕濕熱及冷風傷濕即黃肥傷風即節髙沙蒸即腳腫傷冷即亮頭而白蜇傷火即焦尾又傷風亦黃肥傷冷風即黑白紅僵能避此數患乃善又須先治葉室必深密涼燥而不蒸濕下作架髙五六寸上鋪新簟然後置葉其上勿使通風通風即葉易乾稿常收三日葉以備雨濕則蠶常不食濕葉且不失飢矣外採葉歸必疏爽於葉室中以待其熱氣退乃可與食若便與食則上為葉熱下為沙濕蠶居其中遂成葉蒸矣蒸而黃雖救之亦失半簇箔藏繭之法篇第五簇箔宜以杉木解枋長六尺闊三尺以箭竹作馬眼隔插茅疏密得中復以無葉竹篠縱橫搭之又簇背鋪以蘆箔而以篾透背面縛之即蠶可駐足無跌墜之患且其中深穩稠密旋旋放蠶其上初略欹斜以俟其糞盡微以熟灰火溫之待入網漸漸加火不宜中輟稍冷即遊絲亦止繅之即斷絶多煮爛作絮不能一緒抽盡矣才拆下箔即急剝去繭衣免致蒸壞如多即以鹽藏之蛾乃不出且絲柔韌潤澤也藏繭之法先晒繭令燥埋大甕地上甕中先鋪竹簀次以大桐葉覆之乃鋪繭一重以十斤為率摻鹽二兩上又以桐葉平鋪如此重重隔之以至滿甕然後密蓋以泥封之七日之後出而澡之頻頻換水即絲明快隨以火焙乾即不黯斁而色鮮潔也農書卷下
