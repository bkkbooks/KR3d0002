body:
  text: 農書後跋此書成於紹興十九年真州雖曽刋行而當時𫝊者失真首尾㒹錯意義不貫者甚多又為或人不曉㫖趣妄自刪改徒事絺章繪句而理致乖越是書也將以曉農事之大使人人心喻志解今乃反惑其説使老於農圃而視効於斯文者方且嗤鄙不暇其肯轉相讀説勸勉而依倣之耶㒒誠憂之故取家藏副本繕冩成帙以待當世之君子採取以獻于上然後鍥板流布必使天下之民咸究其利則區區之志願畢矣後五年甲戌元日如是菴全真子題
