  text: 欽定四庫全書子部四
  hash: sha256:940855fe39bdf892ef95be162cb092ce2270c5f8a764e60b4375e12cb73cf01d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3d0002_WYG_000-1a, image: WYG0730/WYG0730-0169a.png}
body:
  text: 農書農家類提要臣等謹案農書三卷影宋抄本題曰陳旉撰宋史藝文志亦同陳振孫書錄解題作西山隠居全真子陳雱撰未詳何人永樂大典所載則作陳敷考漢郊祀歌朱明旉與顔師古注曰旉古敷字永樂大典盖改古文從今文陳氏作雱則字形相近而誤也首有自序佚其前二頁末有洪興祖後序及旉自䟦興祖序稱西山陳居士於六經諸子百家之書釋老氏黄帝神農氏之學貫穿出入往往成誦下至術數小道亦精其能平生讀書不求仕進所至即種藥治圃以自給又稱其紹興己巳年七十四則南北宋間處士也自䟦云此書成於紹興十九年真州雖曾刋行而當時傳者失真首尾顛倒意義不貫者甚多又為或人不曉㫖趣妄自刪改徒事絺章繪句而理致乖越故取家藏副本繕寫成帙以待當世之君子採取以獻於上則興祖所刋之本有所㸃竄旉盖不以為然其自序又稱此書非騰口空言誇張盗名如齊民要術四時纂要迂踈不適用之比其自命殊髙今觀其書上卷泛言農事中卷論養牛下卷論養蠶大抵泛陳大要引經史以證明之虚論多而實事少殊不及齊民要術之典賅詳明遽詆前人殊不自量然所言亦頗有入理者宋人舊帙久無刋本姑存備一家可也末有蠶書一卷宋秦湛撰湛字處度髙郵人秦觀之子也所言蠶事頗詳宋志與旉書各著錄不知何人以綴旉後合為一編其説與旉書下篇可以互相補苴今亦仍並錄之焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀農書序闕分篇目條陳件别而論次之是書也非苟知之葢嘗允蹈之確乎能其事乃敢著其説以示人孔子曰葢有不知而作者我無是也多聞擇其善者而從之多見而識之以言聞見雖多必擇其善者乃從而識其不善者也若徒知之雖多曽何足用文中子曰葢有慕名掠美攘善矜能盗譽而作者其取譏後世寜有已乎若葛抱朴之論神仙陶隠居之疏本草其謬悠之説荒唐之論取誚後世不可勝紀矣僕之所述深以孔子不知而作為可戒文中子慕名而作為可恥與夫葛抱朴陶隠居之述作皆在所不取也此葢叙述先聖人仁民愛物之志固非騰口空言誇張盗名如齊民要術四時纂要迂疎不適用之比也實有補於來世云爾自念人微言輕雖能為可信可用而不能使人必信必用也惟藉仁人君子能取信於人者以利天下之心為心庶能推而廣之以行於此時而利後世少禆吾聖君賢相財成之道輔相之宜以左右斯民則旉飲天和食地徳亦少効物職之宜不虛為太平之幸老爾西山隠居全真子陳旉序
