body:
  text: 農書後序西山陳居士於六經諸子百家之書釋老氏黄帝神農氏之學貫穿出入徃徃成誦如見其人如指諸掌下至術數小道亦精其能其尤精者易也平生讀書不求仕進所至即種藥治圃以自給紹興己巳自西山來訪予於儀真時年七十四出所著農書三卷曰此吾閑中事業不足拈出然使沮溺耦耕之徒見之必有忻然相契處樊遟請學稼子曰吾不如老農先聖之言吾志也樊遟之學吾事也是或一道也僕喜其言取其書讀之三復曰如居士者可謂士矣因以儀真勸農文附其後俾屬邑刻而傳之丹陽洪興祖序
